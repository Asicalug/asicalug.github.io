    <script>
            $('.revealcontacts').click(function() {
                $(this).css( {
                    'transform': 'rotate(90deg)',
                    'transition': 'all 0.3s',
                    'visibility': 'hidden'
                });
                $('.unrevealcontacts').css( {
                    'visibility': 'visible',
                    'transform': 'rotate(90deg)',
                    'transition': 'all 0.3s'
                });
                $('.topbar').css( {
                    'height': '250px'
                });
                $('.contacts').css( {
                    'visibility': 'visible',
                    'height': '75px',
                    'bottom': '90px'
                });
                $('.discord').css( {
                    'height': '24px',
                    'width': '32px',
                });
                $('.acontact').css( {
                    'visibility': 'visible',
                    'height': '50px'
                });
            });
            $('.unrevealcontacts').click(function() {
                $(this).css( {
                    'transform': 'rotate(270deg)',
                    'transition': 'all 0.3s',
                    'visibility': 'hidden'
                });
                $('.revealcontacts').css( {
                    'visibility': 'visible',
                    'transform': 'rotate(270deg)',
                    'transition': 'all 0.3s'
                });
                $('.topbar').css( {
                    'height': '100px'
                });
                $('.contacts').css( {
                    'visibility': 'hidden',
                    'height': '0px',
                    'bottom': '150px',
                });
                $('.discord').css( {
                    'height': '0px',
                    'width': '0px',
                });
                $('.acontact').css( {
                    'visibility': 'hidden',
                    'height': '0px'
                });
            });
            $('.discord').click(function() { 
                $('.discordcontact').css( {
                    'align-items': 'center',
                    'width': '75%',
                    'height': '75%',
                    'visibility': 'visible'
                });
                $('.blur').css( {
                    'visibility': 'visible'
                });
            });
            $('.blur').click(function() { 
                $('.discordcontact').css( {
                    'height': '0px',
                    'width': '0px',
                    'visibility': 'hidden',
                });
                $(this).css({
                    'visibility': 'hidden',
                });
            });
            $('#addmedisc').click(function() { 
                $(location).prop('href', 'https://discord.com/users/1080643375960707092')
            });
            $('.addmediscord').click(function() { 
                $(location).prop('href', 'https://discord.com/users/1080643375960707092')
            });
    </script>
