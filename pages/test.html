<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="" width=device-width, initial-scale="1.0">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<title>About Me</title>
<link href="css/style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css?family=Nunito:wght@300;400;500;600&amp;display=swap" rel="stylesheet">

<body>
    <main>
        <div class="topbar">
            <div class="avatar">
                <img src="https://avatars.githubusercontent.com/u/104523683?s=64&v=4" style="border-radius: 60px;" alt="pfp">
            </div>
            <div class="description">short asf individual</div>
            <div class="revealcontacts">
                <img src="../images/white-right-arrow.svg"/>
            </div>
            <div class="unrevealcontacts">
                <img src="../images/white-right-arrow.svg"/>
            </div>
            <div class="contacts">
                <div class="acontact">
                    <div class="discord"></div>
                </div>
            </div>
        </div>
        <div class="blur"></div>
        <div class="discordcontact">
            <div></div>
        </div>
    </main>
    

    <script>
            $('.revealcontacts').click(function() {
                $(this).css( {
                    'transform': 'rotate(90deg)',
                    'transition': 'all 0.3s',
                    'visibility': 'hidden'
                });
                $('.unrevealcontacts').css( {
                    'visibility': 'visible',
                    'transform': 'rotate(90deg)',
                    'transition': 'all 0.3s'
                });
                $('.topbar').css( {
                    'height': '250px'
                });
                $('.contacts').css( {
                    'visibility': 'visible',
                    'height': '75px',
                    'bottom': '90px'
                });
                $('.discord').css( {
                    'height': '24px',
                    'width': '32px',
                });
                $('.acontact').css( {
                    'visibility': 'visible',
                    'height': '50px'
                });
            });
            $('.unrevealcontacts').click(function() {
                $(this).css( {
                    'transform': 'rotate(270deg)',
                    'transition': 'all 0.3s',
                    'visibility': 'hidden'
                });
                $('.revealcontacts').css( {
                    'visibility': 'visible',
                    'transform': 'rotate(270deg)',
                    'transition': 'all 0.3s'
                });
                $('.topbar').css( {
                    'height': '100px'
                });
                $('.contacts').css( {
                    'visibility': 'hidden',
                    'height': '0px',
                    'bottom': '150px',
                });
                $('.discord').css( {
                    'height': '0px',
                    'width': '0px',
                });
                $('.acontact').css( {
                    'visibility': 'hidden',
                    'height': '0px'
                });
            });
            $('.discord').click(function() { 
                $('.discordcontact').css( {
                    'align-items': 'center',
                    'width': '75%',
                    'height': '75%',
                    'visibility': 'visible'
                });
                $('.blur').css( {
                    'visibility': 'visible'
                });
            });
            $('.blur').click(function() { 
                $('.discordcontact').css( {
                    'height': '0px',
                    'width': '0px',
                    'visibility': 'hidden',
                });
                $(this).css({
                    'visibility': 'hidden',
                })

            });
    </script>
</body>
